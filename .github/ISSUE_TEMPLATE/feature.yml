name: Feature request
description: Propose a product or documentation improvement.
title: "proposal: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user, task, and limitation rather than only a solution.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Explain what successful behavior would look like.
    validations:
      required: true
  - type: dropdown
    id: edition
    attributes:
      label: Edition
      options:
        - OSS
        - Enterprise
        - Both or unknown
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any current workaround or related tool.
