site_name: DataMuru
site_description: Provider-agnostic data infrastructure, governance, and enterprise adoption documentation
site_url: https://ajayaj2000.github.io/DataMuru/
site_author: DataMuru contributors
copyright: Copyright 2026 DataMuru contributors. Documentation licensed under Apache-2.0.
repo_name: AjayAJ2000/DataMuru
repo_url: https://github.com/AjayAJ2000/DataMuru
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  logo: assets/datamuru-mark-canva.png
  favicon: assets/datamuru-icon-64.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - toc.follow
    - toc.integrate
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

plugins:
  - search
  - git-revision-date-localized:
      enable_git_follow: false
      fallback_to_build_date: true
      strict: false
      type: timeago

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

