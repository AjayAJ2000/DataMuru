taxonomy:
  name: datamuru_alpha
  version: "0.1"
  categories:
    - id: internal
      label: Internal
      description: "Internal data"
      handling:
        retention_years: 3
        encryption: at_rest
        sharing: internal_only
    - id: confidential
      label: Confidential
      description: "Sensitive business data"
      handling:
        retention_years: 2
        encryption: at_rest_and_transit
        sharing: need_to_know
    - id: pii_personal
      label: "PII - Personal"
      parent: confidential
      description: "Personal data"
      handling:
        retention_years: 1
        encryption: at_rest_and_transit
        masking: partial_mask
        sharing: restricted
