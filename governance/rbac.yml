rbac:
  roles:
    - id: catalog_user
      name: Catalog User
      permissions:
        - resource_type: catalog
          resource_pattern: "*"
          privilege: USE CATALOG
        - resource_type: schema
          resource_pattern: "*.raw"
          privilege: USE SCHEMA
    - id: raw_editor
      name: Raw Editor
      inherits:
        - catalog_user
      permissions:
        - resource_type: schema
          resource_pattern: "*.raw"
          privilege: CREATE TABLE